<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4a90e2, #50e3c2);
}
.container {
    background: #fff;
    padding: 28px 32px;
    border-radius: 16px;
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
    width: 320px;
}
h1 {
    margin: 0 0 20px;
    font-size: 24px;
    text-align: center;
    color: #333;
}
label {
    display: block;
    margin: 12px 0 6px;
    color: #555;
    font-size: 14px;
}
input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd6df;
    border-radius: 10px;
    font-size: 14px;
    box-sizing: border-box;
}
button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4a90e2;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #3a78c2;
}
.message {
    margin-top: 14px;
    color: #d32f2f;
    font-size: 13px;
    min-height: 18px;
    text-align: center;
}
</style>
</head>
<body>
<div class="container">
    <h1>Acceso a la Plataforma</h1>
    <label for="nameInput">Nombre de Usuario</label>
    <input id="nameInput" type="text" placeholder="Ingresa tu usuario">
    
    <label for="passwordInput">Contraseña</label>
    <input id="passwordInput" type="password" placeholder="Ingresa tu contraseña">

    <div style="display: flex; align-items: center; margin-top: 8px;">
        <input type="checkbox" id="showPassword" style="width: auto; margin-right: 8px;">
        <label for="showPassword" style="margin: 0; cursor: pointer;">Mostrar contraseña</label>
    </div>
    
    <button id="enterButton">ENTRAR</button>
    <div class="message" id="message"></div>

    <div class="forgot-password-container">
    <a href="video.html">¿Olvidó su contraseña?</a>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
